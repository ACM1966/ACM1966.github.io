<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reaction Test Game - aCm1T">
    <title>Reaction Test | aCm1T</title>
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    
    <nav class="navbar">
        <div class="nav-content">
            <a href="../../index.html" class="logo">aCm<span class="highlight">1T</span></a>
            <ul class="nav-links">
                <li><a href="../../index.html"><i class="fa-solid fa-home"></i> Home</a></li>
            </ul>
        </div>
    </nav>

    <main class="game-main">
        <div class="game-container">
            <h1 class="game-title"><i class="fa-solid fa-bolt"></i> Reaction Test</h1>
            
            <div class="game-info">
                <div class="score-display">
                    <span class="score-label">Best</span>
                    <span class="score-value" id="best-time">---</span>
                </div>
                <div class="score-display">
                    <span class="score-label">Average</span>
                    <span class="score-value" id="avg-time">---</span>
                </div>
            </div>

            <div class="reaction-box" id="reactionBox">
                <div class="reaction-content">
                    <p id="reactionText">Click to Start</p>
                    <p id="reactionSubtext">When the box turns green, click as fast as you can!</p>
                </div>
            </div>

            <div class="attempts-list">
                <h3>Recent Attempts</h3>
                <div id="attemptsList" class="attempts-grid"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; <span id="year">2026</span> aCm1T. All rights reserved.</p>
        <div class="social-links">
            <a href="https://github.com/aCm1T" target="_blank" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
            <a href="../../index.html"><i class="fa-solid fa-home"></i></a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
